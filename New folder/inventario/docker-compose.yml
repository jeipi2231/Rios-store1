services:
  db:
    image: mysql:8.0
    container_name: inventario_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventario}
      MYSQL_USER: ${MYSQL_USER:-inventario_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-inventario_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - inventario_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventario_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-inventario}
      DB_USER: ${MYSQL_USER:-inventario_user}
      DB_PASS: ${MYSQL_PASSWORD:-inventario_pass}
    volumes:
      - ./src:/var/www/html
    networks:
      - inventario_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: inventario_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
    networks:
      - inventario_net

volumes:
  db_data:

networks:
  inventario_net:
    driver: bridge
